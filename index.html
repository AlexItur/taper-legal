<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Táper — Soporte y legal</title>
<style>
  :root { --ink: #26331a; --accent: #324323; --muted: #6b7280; --cream: #faf6f1; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', -apple-system, 'Segoe UI', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.7; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 24px; }
  main { max-width: 480px; text-align: center; }
  .logo { font-size: 3rem; margin-bottom: 8px; }
  h1 { font-size: 2rem; font-weight: 900; }
  .tagline { color: var(--muted); margin-bottom: 32px; }
  .links { display: flex; flex-direction: column; gap: 12px; }
  .links a { display: block; background: white; border-radius: 9999px; padding: 14px 28px; text-decoration: none; color: var(--accent); font-weight: 800; box-shadow: 0 1px 4px rgba(38,51,26,.08); transition: transform .15s cubic-bezier(.4,0,.2,1); }
  .links a:hover { transform: scale(1.02); }
  .soporte { margin-top: 32px; font-size: .9rem; color: var(--muted); }
  .soporte a { color: var(--accent); font-weight: 700; }
</style>
</head>
<body>
<main>
  <div class="logo">🍱</div>
  <h1>Táper</h1>
  <p class="tagline">Tu menú semanal con lista de la compra ajustada a tu presupuesto y súper.</p>
  <div class="links">
    <a href="privacidad.html">Política de privacidad</a>
    <a href="terminos.html">Términos de uso</a>
  </div>
  <p class="soporte">¿Necesitas ayuda con la app?<br>Escríbenos a <a href="mailto:info.apptaper@gmail.com">info.apptaper@gmail.com</a></p>
</main>
</body>
</html>
